;; /etc/xrdp/xrdp.ini — RDP server configuration
;; Architecture:  Windows RDP (mstsc.exe) → xrdp → Xvnc (127.0.0.1:5901) → TigerVNC desktop
;;
;; xrdp acts as an RDP-to-VNC bridge.  It listens on port 3389 for
;; incoming RDP connections and forwards them to Xvnc (TigerVNC on
;; localhost:5901).  No X server or Wayland compositor is required
;; beyond Xvnc itself.

[Globals]
ini_version=1
port=3389
fork=true
tcp_nodelay=true
tcp_keepalive=true
security_layer=negotiate
crypt_level=high
certificate=
key_file=
ssl_protocols=TLSv1.2,TLSv1.3
autorun=Xvnc

; Allow only loopback VNC connections (wayvnc runs locally)
;

[Logging]
LogFile=/var/log/xrdp.log
LogLevel=INFO
EnableSyslog=true
SyslogLevel=INFO

[Channels]
rdpdr=true
rdpsnd=true
drdynvc=true
cliprdr=true
rail=true
xrdpvr=true

; ---------------------------------------------------------------
; VNC backend — connects to Xvnc on localhost:5901
; This is the only session type.  xrdp translates RDP ↔ RFB (VNC).
[Xvnc]
name=VNC-to-Xvnc
lib=libvnc.so
ip=127.0.0.1
port=5901
username=na
password=
max_bpp=32
use_compression_level=2

; ---------------------------------------------------------------
; Session types — only VNC is active
; ---------------------------------------------------------------
[SessionTypes]
sessions=Xvnc
