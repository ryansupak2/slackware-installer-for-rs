<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
	<!--
		Berkeley Mono Fallback Configuration

		Keep "Berkeley Mono" as the primary/requested font (for its look in st, dwm, etc.),
		but automatically "fill in" missing glyphs (e.g. π, other Greek, symbols, CJK, emoji, etc.)
		from more complete fonts.

		This uses fontconfig's edit/append mechanism so that when an application requests
		"Berkeley Mono", the resulting font selection list will try Berkeley first for each
		glyph, then fall back to the appended families only for glyphs not present in it.

		No change to the visual style of characters that Berkeley Mono *does* have.
	-->

	<!-- Primary rule: when "Berkeley Mono" is explicitly requested, append good fallbacks -->
	<match target="pattern">
		<test name="family" compare="eq" ignore-blanks="true">
			<string>Berkeley Mono</string>
		</test>
		<edit name="family" mode="append" binding="strong">
			<string>DejaVu Sans Mono</string>
			<string>Noto Sans Mono</string>
			<string>Noto Sans CJK JP</string>
			<string>Noto Color Emoji</string>
			<string>monospace</string>
		</edit>
	</match>

	<!-- Also promote Berkeley Mono to the top of the generic "monospace" family list -->
	<!-- (helps for apps that ask for generic monospace or don't hardcode the name) -->
	<alias binding="strong">
		<family>monospace</family>
		<prefer>
			<family>Berkeley Mono</family>
			<family>DejaVu Sans Mono</family>
			<family>Noto Sans Mono</family>
			<family>Noto Sans CJK JP</family>
			<family>Noto Color Emoji</family>
		</prefer>
	</alias>

	<!-- Optional: also handle slight variations in naming that fontconfig might see -->
	<match target="pattern">
		<test name="family" compare="eq" ignore-blanks="true">
			<string>BerkeleyMono</string>
		</test>
		<edit name="family" mode="append" binding="strong">
			<string>DejaVu Sans Mono</string>
			<string>Noto Sans Mono</string>
			<string>Noto Sans CJK JP</string>
			<string>Noto Color Emoji</string>
		</edit>
	</match>
</fontconfig>
