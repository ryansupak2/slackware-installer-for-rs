# Minimal override to ensure the GPU line is shown.
# Uses bobdobbs ASCII art as the default image source.
# Copy bobdobbs.txt alongside this config to ~/.config/neofetch/
image_source="$HOME/.config/neofetch/bobdobbs.txt"

underline_enabled="on"

# Custom multi-manager package counts.
# This must integrate with neofetch's info() mechanism.
# We define get_packages() which populates the 'packages' variable.
# Then use the normal: info "Packages" packages
get_packages() {
    local pkg_c=$(ls /var/log/packages/ 2>/dev/null | wc -l || echo 0)
    local npm_c=0
    if command -v npm >/dev/null 2>/dev/null; then
        npm_c=$(npm list -g --depth=0 2>/dev/null | tail -n +2 | wc -l || echo 0)
    fi
    local pip_c=0
    if command -v pip >/dev/null 2>&1; then
        pip_c=$(pip list 2>/dev/null | tail -n +2 | wc -l || echo 0)
    fi
    packages="pkg:$pkg_c npm:$npm_c pip:$pip_c"
}
}

get_hard_disk() {
    # Root filesystem used / total (human readable), formatted like Memory
    hard_disk=$(df -h / 2>/dev/null | awk 'NR==2 {print $3 " / " $2}' || echo "N/A")
}

print_info() {
    info title
    info underline
    info "OS" distro
    info "Host" model
    info "Kernel" kernel
    info "Uptime" uptime
    info "Packages" packages
    info "Shell" shell
    info "Resolution" resolution
    info "DE" de
    info "WM" wm
    info "WM Theme" wm_theme
    info "Theme" theme
    info "Icons" icons
    info "Terminal" term
    info "Terminal Font" term_font
    info "CPU" cpu
    info "GPU" gpu
    info "Memory" memory
    info "Hard Disk" hard_disk

    info cols
}
