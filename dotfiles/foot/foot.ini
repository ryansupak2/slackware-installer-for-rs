# foot.ini — foot terminal emulator configuration
# Matches the dwm color scheme and Berkeley Mono font.

[main]
font=Berkeley Mono:size=16,Noto Sans CJK JP:size=16
pad=8x8
shell=bash

[scrollback]
lines=10000

[colors]
background=000000
foreground=bbbbbb
regular0=000000
regular1=bb4444
regular2=44bb44
regular3=bbbb44
regular4=4444bb
regular5=bb44bb
regular6=44bbbb
regular7=bbbbbb
bright0=444444
bright1=ff4444
bright2=44ff44
bright3=ffff44
bright4=4444ff
bright5=ff44ff
bright6=44ffff
bright7=ffffff
cursor=000000 ffffff
